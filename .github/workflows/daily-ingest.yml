name: Infloww ingest (every 4h)

on:
  schedule:
    # Every 4 hours UTC = 00, 04, 08, 12, 16, 20 (= 02, 06, 10, 14, 18, 22 Rome).
    # 6 runs/day × ~4 min × 30 days ≈ 720 min/month, well under the 2000 min free tier.
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingest/requirements.txt

      - name: Install deps
        run: pip install -r ingest/requirements.txt

      - name: Run ingest
        env:
          INFLOWW_API_KEY: ${{ secrets.INFLOWW_API_KEY }}
          INFLOWW_OID: ${{ secrets.INFLOWW_OID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest/ingest_infloww.py
