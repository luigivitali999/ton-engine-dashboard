name: Daily Infloww ingest

on:
  schedule:
    # 03:00 UTC daily — past Infloww's 2h sync delay on /v1/links
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ingest/requirements.txt

      - name: Install deps
        run: pip install -r ingest/requirements.txt

      - name: Run ingest
        env:
          INFLOWW_API_KEY: ${{ secrets.INFLOWW_API_KEY }}
          INFLOWW_OID: ${{ secrets.INFLOWW_OID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest/ingest_infloww.py
